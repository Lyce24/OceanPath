# ── Encoder: UNI v1 (Mahmood Lab) ─────────────────────────────────────────────
#
# Vision Transformer foundation model for histopathology.
# Produces 1024-dim patch embeddings.

name: uni_v1
type: patch              # "patch" or "slide"
feature_dim: 1024
checkpoint_path: null    # null = use TRIDENT's default download
family: vit_large_patch16_224
source: MahmoodLab/UNI
adapter: trident
mag: 20
patch_size: 256

# TRIDENT output subdirectory name (auto-generated by TRIDENT)
# Patch encoders: features_{name}  |  Slide encoders: slide_features_{name}
features_subdir: features_${encoder.name}

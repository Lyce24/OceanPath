# ── SSL Method: I-JEPA (Slide-level) ──────────────────────────────────────────
#
# Assran et al., "Self-Supervised Learning from Images with a Joint-Embedding
# Predictive Architecture", CVPR 2023. Adapted to slide-level bag features.
#
# Context encoder sees a subset of patches (context).
# Predictor tries to predict the target encoder's output for held-out patches.
# No data augmentation needed — asymmetry comes from masking.

name: jepa
family: predictive

# ── EMA schedule ──────────────────────────────────────────────────────────────
ema_decay_base: 0.996
ema_decay_final: 1.0

# ── Masking strategy ──────────────────────────────────────────────────────────
context_frac: [0.5, 0.8]       # fraction of patches visible to context encoder
target_frac: [0.15, 0.3]       # fraction of patches in each target block
n_target_blocks: 4              # number of disjoint target blocks to predict

# ── Predictor ─────────────────────────────────────────────────────────────────
pred_hidden_dim: 2048
pred_depth: 4                   # number of transformer layers in predictor
pred_num_heads: 8

# ── Projector (optional, applied before prediction) ──────────────────────────
proj_dim: 384
proj_hidden_dim: 2048
proj_num_layers: 2
proj_use_bn: false

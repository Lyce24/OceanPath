# ── SSL Method: DINOv2 (Slide-level) ──────────────────────────────────────────
#
# Oquab et al., "DINOv2: Learning Robust Visual Features without Supervision",
# TMLR 2024. Adapted to slide-level MIL aggregators.
#
# Student→teacher distillation with centering + sharpening.
# Multi-crop: 2 global views + N local views (subset of patches).

name: dinov2
family: distillation

# ── EMA schedule ──────────────────────────────────────────────────────────────
ema_decay_base: 0.996
ema_decay_final: 1.0

# ── Temperature ───────────────────────────────────────────────────────────────
teacher_temp: 0.04          # teacher sharpening temperature
student_temp: 0.1           # student temperature
teacher_temp_warmup: 0.04   # starting teacher temp (ramps to teacher_temp)
teacher_temp_warmup_epochs: 30

# ── Centering ─────────────────────────────────────────────────────────────────
center_momentum: 0.9        # EMA for centering vector

# ── Projector ─────────────────────────────────────────────────────────────────
proj_dim: 256
proj_hidden_dim: 2048
proj_num_layers: 3
proj_use_bn: true

# ── Multi-crop (patch subset sizes) ──────────────────────────────────────────
n_global_views: 2           # large subsets (70-100% of patches)
n_local_views: 4            # small subsets (20-50% of patches)
global_patch_frac: [0.7, 1.0]   # fraction of patches for global views
local_patch_frac: [0.2, 0.5]    # fraction of patches for local views

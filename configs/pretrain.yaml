# ── Root config for: scripts/pretrain.py (Stage 4.5) ──────────────────────────
#
# SSL pretraining of slide-level MIL aggregators on UNLABELED bags.
# Learns task-agnostic slide embeddings that Stage 5 can fine-tune.
#
# Usage:
#   # VICReg with ABMIL on UNI2-h features
#   python scripts/pretrain.py platform=local data=uni2h_pretrain \
#       encoder=uni2h model=abmil pretrain_training=vicreg
#
#   # SimCLR with TransMIL
#   python scripts/pretrain.py platform=local data=uni2h_pretrain \
#       encoder=uni2h model=transmil pretrain_training=simclr
#
#   # BYOL with custom LR
#   python scripts/pretrain.py platform=local data=uni2h_pretrain \
#       encoder=uni2h model=abmil pretrain_training=byol pretrain_training.lr=5e-4
#
#   # DINOv2 (multi-crop) with TransMIL
#   python scripts/pretrain.py platform=local data=uni2h_pretrain \
#       encoder=uni2h model=transmil pretrain_training=dinov2
#
#   # I-JEPA (predictive masking)
#   python scripts/pretrain.py platform=local data=uni2h_pretrain \
#       encoder=uni2h model=abmil pretrain_training=jepa
#
#   # Use in Stage 5 (fine-tune from pretrained backbone):
#   python scripts/train.py platform=local data=blca encoder=uni2h model=abmil \
#       training=pretrain \
#       training.aggregator_weights_path=outputs/pretrain/.../aggregator_weights.pt

defaults:
  - platform: local
  - data: uni2h_pretrain
  - encoder: uni2h
  - model: abmil
  - pretrain_training: vicreg
  - _self_

# ── Experiment naming ─────────────────────────────────────────────────────────
exp_name: pretrain_${data.name}_${encoder.name}_${model.name}_${pretrain_training.ssl_method}

# ── Backward-compatible alias (used by pipeline fingerprints) ────────────────
pretrain:
  name: ${pretrain_training.ssl_method}

# ── Derived paths ─────────────────────────────────────────────────────────────
output_dir: ${platform.output_root}/pretrain/${exp_name}
mmap_dir: ${data.mmap_dir}

# Optional manifest-driven split for reproducible pretraining runs.
# If null, pretrain.py will perform random splitting from pretrain_training.val_frac.
pretrain_split_manifest: null

# Optional explicit manifest filter (defaults to data.csv_path in pretrain.py).
pretrain_csv: ${data.csv_path}
pretrain_filename_column: ${data.filename_column}

# ── Pipeline flags ────────────────────────────────────────────────────────────
dry_run: false
verbose: false

# ── W&B logging ───────────────────────────────────────────────────────────────
wandb:
  project: oceanpath-pretrain
  entity: null
  group: ${exp_name}
  tags:
    - pretrain
    - ${data.name}
    - ${encoder.name}
    - ${model.arch}
    - ${pretrain_training.ssl_method}
  offline: false

# ── Root config for: scripts/build_mmap.py ────────────────────────────────────
#
# Usage:
#   python scripts/build_mmap.py platform=local data=blca encoder=conch_v15
#   python scripts/build_mmap.py ... storage.feat_precision=32
#   python scripts/build_mmap.py ... storage.filter_by_csv=true
#   python scripts/build_mmap.py ... force=true

defaults:
  - platform: local
  - runtime: default
  - data: blca
  - encoder: univ1
  - extraction: default
  - storage: mmap
  - _self_

# ── Pipeline flags ────────────────────────────────────────────────────────────
dry_run: false        # validate inputs only, report what would happen
force: false          # rebuild even if mmap exists and source hash matches
verbose: false

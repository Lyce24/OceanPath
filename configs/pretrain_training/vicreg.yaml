# VICReg — Tier-2 controlled comparison
# All shared training/data/projector/augmentation defaults live in base.yaml.
# Only the per-method variables appear below.
defaults:
  - base
  - _self_

ssl_method: vicreg

# Tier-2 LR — calibrated for VICReg's invariance/variance/cov balance.
lr: 3e-4

ssl:
  inv_weight: 25.0
  var_weight: 25.0
  cov_weight: 1.0           # FIX from historical 4.0 (over-regularised features)
  var_target: 1.0
  var_eps: 1e-4
  # VICReg requires BN-free projector — variance term measures per-dim
  # standard deviation across the batch and BN would zero it by construction.
  proj_use_bn: false
  proj_last_bn: false

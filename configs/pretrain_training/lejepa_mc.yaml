# LeJEPA-MC ‚Äî Tier-2 controlled comparison: LeJEPA-2C + extra LOCAL crops.
#
# Contract:
#   The TWO global views are sampled IDENTICALLY to LeJEPA-2C (which itself
#   inherits base.yaml's dual-view pipeline ‚Äî same as VICReg / JEPA).
#   Pipeline = shared D4 ‚Üí split via `split_overlap` ‚Üí per-view crop ‚Üí mask ‚Üí refill.
#   The local views are added on top: each local samples INDEPENDENTLY from
#   the full slide via crop ‚Üí mask ‚Üí refill (DINO / iBOT convention).
#
# The split-style global path is enabled by inheriting base.yaml's
# `split_overlap` (currently 0.2). When `split_overlap < 1.0` and V_g == 2,
# `WSIMultiCropAugmentor` routes the global pair through a nested
# `WSIDualViewAugmentor`, so MC globals are bit-equivalent to LeJEPA-2C
# globals. Any LeJEPA-MC vs LeJEPA-2C delta is therefore attributable to the
# addition of local crops alone.
#
# To run "paper-default" MC instead (independent globals, no split), override
# `augmentation.split_overlap: 1.0` here or on the CLI.

defaults:
  - base
  - _self_

ssl_method: lejepa_mc

# Tier-2 LR ‚Äî matches LeJEPA-2C; tune in calibration if MC dynamics differ.
lr: 5e-4

ssl:
  sigreg_weight: 0.05
  num_slices: 1024
  integration_points: 17
  integration_range: 5.0

  # Number of views ‚Äî informational here; the augmentor below is the source
  # of truth at step time (per-batch num_global / num_local from the collator).
  num_global_views: 2
  num_local_views: 2

# Override base.yaml's dual_view augmentation with multi-crop.
augmentation:
  d4_mode: shared
  num_global_views: 2
  num_local_views: 2

  # Per-view fixed_n. Local views are smaller bags by design (DINO-style).
  global_fixed_n: 2048
  local_fixed_n: 1024

  # ‚îÄ‚îÄ Global views: must match base.yaml's dual-view EXACTLY ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  # These mirror the `crop_*` / `mask_*` / `min_tokens` block in base.yaml.
  # When `split_overlap` (inherited from base) is <1.0, `WSIMultiCropAugmentor`
  # routes the V_g=2 global pair through a nested `WSIDualViewAugmentor` built
  # from these knobs ‚Äî so MC globals are bit-equivalent to LeJEPA-2C globals.
  global_crop_area_range:    [0.35, 0.80]
  global_crop_aspect_range:  [0.75, 1.333]
  global_crop_min_keep_frac: 0.45
  global_mask_ratio_range:   [0.15, 0.40]
  global_mask_min_keep_frac: 0.50
  global_min_tokens:         256

  # ‚îÄ‚îÄ Local views: smaller crop area, gentler masking, lower min_tokens ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
  local_crop_area_range:    [0.25, 0.60]
  local_crop_aspect_range:  [0.75, 1.333]
  local_crop_min_keep_frac: 0.5
  local_mask_ratio_range:   [0.05, 0.20]
  local_mask_min_keep_frac: 0.65
  local_min_tokens:         128

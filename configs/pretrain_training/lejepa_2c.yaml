# LeJEPA-2C — Tier-2 controlled comparison.
# Same dual-view augmentation as VICReg / JEPA (held identical in base.yaml).
# Loss = predictive (centroid match) + SIGReg, no predictor, no EMA target.
defaults:
  - base
  - _self_

ssl_method: lejepa

# Tier-2 LR — matches the LeJEPA paper's canonical AdamW 5e-4.
lr: 5e-4

ssl:
  sigreg_weight: 0.05
  num_slices: 2048
  integration_points: 17
  integration_range: 5.0

# LeJEPA-2C is dual-view (V_g=2, V_l=0); the augmentor in base.yaml produces
# exactly two views. For multi-crop (V_g + V_l) variants see lejepa_mc.yaml.

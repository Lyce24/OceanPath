# ── Model: Mamba2MIL (Mamba-2 SSM + Gated Attention Pooling) ──────────────────
# COBRA/MambaMIL-inspired slide encoder using Mamba-2 SSD layers.
# Linear-complexity alternative to TransMIL for long bags.
name: mambamil
arch: mambamil

# ── Architecture ──────────────────────────────────────────────────────────────
embed_dim: 384            # internal dimension (384 safe for B=128, N=4800 on 24GB)
num_layers: 2             # number of Mamba-2 SSD blocks (COBRA uses 2)
d_state: 64               # SSM state size (COBRA uses 64; Mamba2 default is 128)
d_conv: 4                 # causal conv1d kernel width
expand: 2                 # inner dim = expand × embed_dim = 768
headdim: 64               # SSD head dim; must divide expand × embed_dim
attn_dim: 256             # gated attention hidden dimension
dropout: 0.1              # dropout in the attention pooling network
use_hilbert: false
hilbert_order: 16         # order of the Hilbert curve

# ── Inference ─────────────────────────────────────────────────────────────────
use_cobra_inference: false # if true: pool raw embeddings using Mamba-derived weights (Eq.6)

# ── Optimization ──────────────────────────────────────────────────────────────
gradient_checkpointing: false  # checkpoint each Mamba block (recommended for large bags)

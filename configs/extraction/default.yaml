# ── Extraction: default settings ──────────────────────────────────────────────
# Hydra places these keys under cfg.extraction automatically.

# ── Segmentation ──────────────────────────────────────────────────────────────
segmenter: hest
seg_conf_thresh: 0.5
remove_holes: false
remove_artifacts: false
remove_penmarks: false

# ── Patching ──────────────────────────────────────────────────────────────────
# The encoder profile owns its required sampling geometry. This prevents an
# encoder switch from silently reusing another model's incompatible patch size.
mag: ${encoder.mag}
patch_size: ${encoder.patch_size}
overlap: 0
min_tissue_proportion: 0.0
coords_dir: null

# Derived: TRIDENT's auto-generated subdirectory name
coords_subdir: ${extraction.mag}x_${extraction.patch_size}px_${extraction.overlap}px_overlap

# ── Runtime ───────────────────────────────────────────────────────────────────
gpu: ${platform.gpu}
batch_size: 64
seg_batch_size: null
feat_batch_size: null
max_workers: ${platform.num_workers}
# Continue processing other slides after one fails, but fail the stage after
# validation when require_complete=true. This yields a complete error inventory
# without silently training on a smaller cohort.
skip_errors: true
require_complete: true

# ── WSI caching (slow NFS → fast local SSD) ──────────────────────────────────
wsi_cache: ${platform.wsi_cache}
cache_batch_size: 32

# ── WSI reader ────────────────────────────────────────────────────────────────
wsi_ext: ${data.wsi_extensions}
reader_type: null
search_nested: false

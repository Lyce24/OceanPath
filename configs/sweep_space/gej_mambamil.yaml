# ── Sweep space: supervised training (scripts/train.py) ──────────────────────
#
# Sweeps MIL architecture, optimizer, loss, and regularization hyperparameters.
# Uses holdout split for fast screening; top configs are automatically
# revalidated with full k-fold CV + finalization + evaluate.py.
#
# Two-stage flow:
#   Stage 1 (screening): holdout split, skip_finalize=true → fast trial ranking
#   Stage 2 (revalidation): full k-fold (from fixed_overrides.splits) +
#     finalize (best_fold/ensemble/refit) + evaluate.py (bootstrap CIs,
#     patient-level AUROC, calibration, threshold stability) → final ranking
#
# Screening metric: test/auroc from holdout (noisy, for filtering)
# Revalidation metric: patient-level AUROC with CIs from evaluate.py (authoritative)

pipeline: supervised
target_script: train.py

# ── Objective ────────────────────────────────────────────────────────────────
# Single-objective optimization on test/auroc.
# Additional metrics are tracked as trial user attributes for post-hoc analysis.
objective:
  metric: "test/auroc"
  direction: maximize

# Tracked metrics: logged as user attributes on each trial for inspection
# via analyze_sweep.py, optuna-dashboard, or the results JSON.
tracked_metrics:
  - "test/f1"
  - "test/acc"
  - "test/precision"
  - "test/recall"
  - "test/loss"

# ── Fixed overrides (always applied to every trial) ─────────────────────────
fixed_overrides:
  data: gej
  encoder: univ2
  splits: kfold5
  training: gej

# Raw Hydra overrides passed directly to child processes (no flattening)
extra_overrides:
  - "data.mmap_dir=./mmap/gej_univ2"
  - "training.return_coords=true"  # must return coords for Hilbert sorting in MambaMIL

# ── Screening: fast settings for initial exploration ─────────────────────────
# Disable for full validation on final top-K configs.
screening:
  enabled: true
  overrides:
    splits: heldout_80_10_10
    training:
      max_epochs: 80
      early_stopping_patience: 12
      skip_finalize: true
      return_coords: true  # must return coords for Hilbert sorting in MambaMIL

# ── Search space ─────────────────────────────────────────────────────────────
# Parameters are sampled in order. Conditional params must come AFTER the
# parameter they depend on.
search_space:
  # ── Architecture ─────────────────────────────────────────────────────────
  - name: model
    type: categorical
    choices: [mamba2mil]

  # ── Optimization ─────────────────────────────────────────────────────────
  - name: training.lr
    type: float
    low: 1e-5
    high: 1e-2
    log: true

  - name: training.weight_decay
    type: float
    low: 1e-5
    high: 1e-2
    log: true

  - name: training.accumulate_grad_batches
    type: int
    low: 1
    high: 12

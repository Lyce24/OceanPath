# ── Sweep space: supervised training (scripts/train.py) ──────────────────────
#
# Sweeps MIL architecture, optimizer, loss, and regularization hyperparameters.
# Uses holdout split for fast screening; top configs are automatically
# revalidated with full k-fold CV + finalization + evaluate.py.
#
# Two-stage flow:
#   Stage 1 (screening): holdout split, skip_finalize=true → fast trial ranking
#   Stage 2 (revalidation): full k-fold (from fixed_overrides.splits) +
#     finalize (best_fold/ensemble/refit) + evaluate.py (bootstrap CIs,
#     patient-level AUROC, calibration, threshold stability) → final ranking
#
# Screening metrics: test/auroc from holdout (noisy, for filtering)
# Revalidation metrics: patient-level AUROC with CIs from evaluate.py (authoritative)

# 4096 - supervised_sweep_20260327_204714
# 8192 - supervised_sweep_20260327_210715
# no_cap - supervised_sweep_20260327_204718

pipeline: supervised
target_script: train.py

# ── Objective ────────────────────────────────────────────────────────────────
objective_metrics:
  - name: "test/auroc"
    direction: maximize
    primary: true
  - name: "test/f1"
    direction: maximize
  - name: "test/acc"
    direction: maximize
  - name: "test/precision"
    direction: maximize
  - name: "test/recall"
    direction: maximize
  - name: "test/loss"
    direction: minimize

# ── Fixed overrides (always applied to every trial) ─────────────────────────
fixed_overrides:
  data: gej
  encoder: univ2
  splits: kfold5
  training: gej

# Raw Hydra overrides passed directly to child processes (no flattening)
extra_overrides:
  - "data.mmap_dir=./mmap/gej_univ2_4096"

# ── Screening: fast settings for initial exploration ─────────────────────────
# Disable for full validation on final top-K configs.
screening:
  enabled: true
  overrides:
    splits: heldout_80_10_10
    training:
      max_epochs: 80
      early_stopping_patience: 12
      skip_finalize: true

# ── Search space ─────────────────────────────────────────────────────────────
# Parameters are sampled in order. Conditional params must come AFTER the
# parameter they depend on.
search_space:
  # ── Architecture ─────────────────────────────────────────────────────────
  - name: model
    type: categorical
    choices: [abmil]

  # ── Optimization ─────────────────────────────────────────────────────────
  - name: training.lr
    type: float
    low: 1e-5
    high: 7e-3
    log: true

  - name: training.weight_decay
    type: float
    low: 1e-4
    high: 1e-2
    log: true

  - name: training.lr_scheduler
    type: categorical
    choices: [cosine, none]

  - name: training.accumulate_grad_batches
    type: int
    low: 1
    high: 8

  # - name: training.warmup_epochs
  #   type: int
  #   low: 0
  #   high: 10

  # ── Loss ─────────────────────────────────────────────────────────────────
  - name: training.loss_type
    type: categorical
    choices: [ce]


# ── Root config for: scripts/linear_probing.py ──────────────────────────────────
#
# End-to-end linear probing pipeline:
#   1) Extract slide-level embeddings from patch-level mmap (mean-pool or aggregator)
#   2) Run sklearn linear probe (grouped CV, external test, or predefined split)
#
# Embedding cache is keyed by mode + arch + checkpoint + max_instances.
# Different extraction configs get separate cache directories automatically.
# Set embedding.mmap_dir explicitly to use a pre-extracted mmap (skips extraction).
# Set force_extract=true to rebuild even if a matching cache exists.
#
# Usage:
#   # Mean-pool + 5-fold CV on GEJ
#   python scripts/linear_probing.py platform=local data=gej encoder=univ2
#
#   # Pretrained aggregator + 5-fold CV
#   python scripts/linear_probing.py platform=local data=gej encoder=univ2 \
#       model=bimamba embedding.mode=aggregator \
#       embedding.ckpt=outputs/pretrain/vicreg/model.ckpt
#
#   # Skip extraction — use pre-extracted embeddings directly
#   python scripts/linear_probing.py platform=local data=gej encoder=univ2 \
#       embedding.mmap_dir=mmap/gej_custom_embeddings
#
#   # External transfer: train TCGA -> test CPTAC
#   python scripts/linear_probing.py platform=local data=tcga_nsclc encoder=univ2 \
#       protocol=external_test \
#       test.mmap_dir=mmap/cptac_nsclc_patch_features \
#       test.manifest_csv=manifests/cptac_nsclc.csv
#
#   # Predefined split from manifest column
#   python scripts/linear_probing.py platform=local data=gej encoder=univ2 \
#       protocol=predefined_split split_column=split

defaults:
  - platform: local
  - data: gej
  - encoder: univ2
  - extraction: default
  - model: bimamba
  - storage: mmap
  - _self_

# ═════════════════════════════════════════════════════════════════════════════
# Embedding extraction
# ═════════════════════════════════════════════════════════════════════════════
embedding:
  # mean_pool: simple mean-pooling of patch features (no model needed)
  # aggregator: forward through MIL aggregator and take slide_embedding
  mode: mean_pool

  # Base directory for auto-derived embedding mmaps.
  # Embeddings land at: {base_dir}/{data.name}_{cache_tag}_embeddings/
  base_dir: ${platform.mmap_root}/lp_embeddings

  # Output embedding mmap directory.
  # null = auto-derive from base_dir + data.name + mode + arch + ckpt + max_instances.
  # Set explicitly to use a pre-extracted mmap (skips extraction entirely).
  mmap_dir: null

  # Aggregator checkpoint (mode=aggregator only). null = random-init baseline.
  ckpt: null

  # Runtime
  batch_size: 1
  num_workers: ${platform.num_workers}
  # The whole training stack (collator buffer, VRAM budget, batching) is
  # built around fixed_n=2048 token caps. Probing at the same regime
  # avoids OOD sequence-length extrapolation and OOM surprises.
  max_instances: 2048
  # Subsample strategy when bag size > max_instances.
  # contiguous: deterministic first-N (matches pretraining contiguous pre-cap).
  # random: uniform without replacement, deterministic per slide.
  # spatial_stratified: bin tokens into a grid over the bbox and sample
  #   evenly across cells; matches MmapDataset.cap_grid_size=32 used during
  #   pretraining. Best tissue coverage at eval time.
  sampling_mode: spatial_stratified
  sampling_seed: 42
  device: null               # null = auto-detect (cuda if available)

  # Output mmap precision
  feat_precision: 32         # slide embeddings are compact; prefer full precision
  coord_dtype: int32
  max_chunk_gb: 9.5

# Force re-extraction even if embedding mmap exists
force_extract: false

# ═════════════════════════════════════════════════════════════════════════════
# Linear probing
# ═════════════════════════════════════════════════════════════════════════════

# ── Evaluation protocol ─────────────────────────────────────────────────────
# grouped_cv:       patient-level grouped k-fold cross-validation
# external_test:    train on source cohort, test once on target cohort
# predefined_split: use manifest split column to define train/test
protocol: grouped_cv
n_splits: 5
inner_splits: 3              # inner CV folds for C selection; 0 or 1 = disable
primary_metric: null          # null = auto (auroc for binary, macro_f1 for multiclass)

# ── Predefined split partition names (protocol=predefined_split only) ────────
# Which split_column values map to train vs eval. Case-insensitive.
train_split_names: [train, tr]
eval_split_names: [test, te]

# ── External test cohort (protocol=external_test only) ───────────────────────
test:
  mmap_dir: null              # patch-level mmap for external test cohort
  manifest_csv: null
  # Optional column overrides if test manifest uses different names.
  # null = fall back to primary manifest column names.
  label_column: null
  patient_column: null
  filename_column: null
  slide_id_column: null

# ── Probe hyperparameters ────────────────────────────────────────────────────
c_grid: [0.0001, 0.001, 0.01, 0.1, 1.0, 10.0, 100.0]
class_weight: balanced
max_iter: 5000
multi_class_mode: auto        # auto | multinomial | ovr

# ── Label efficiency ────────────────────────────────────────────────────────
# Fraction of labeled training patients/groups used to fit and tune the probe.
# Held-out validation folds and external test cohorts remain full-size.
# Per-class group quotas round up, so very small fractions may use slightly
# more than the requested percentage to keep every class represented.
label_fraction: 1.0
label_fraction_seed: ${seed}

# ── Manifest columns ────────────────────────────────────────────────────────
label_column: ${data.label_columns.0}
patient_column: ${data.patient_id_column}
slide_id_column: null
filename_column: ${data.filename_column}
split_column: null            # for protocol=predefined_split

# ── Robustness / IO ─────────────────────────────────────────────────────────
non_singleton_policy: error   # error | mean | first
allow_missing_mmap: false
allow_missing_manifest: false

# Aggregate slide-level predictions to one prediction per patient before
# computing metrics. Set false when sections of the same case can carry
# different labels (e.g. GEJ Barrett's per-section severity). When false,
# patients are still used as CV groups (no patient leakage across folds),
# but metrics are computed per slide.
aggregate_to_patient: true

# ── Output ───────────────────────────────────────────────────────────────────
output_dir: ${platform.output_root}/linear_probe/${data.name}_${encoder.name}_${embedding.mode}_${protocol}
save_model: false
n_boot: 0                    # bootstrap resamples for 95% CIs; 0 = skip, 1000 = recommended for final reporting
seed: 42
verbose: false

# ── Root config for: scripts/train_supervised.py ─────────────────────────────
#
# Lightweight supervised MIL training with patient-level evaluation.
# Output format matches linear_probing_sklearn.py for direct comparison.
#
# Usage:
#   # ABMIL from scratch
#   python scripts/train_supervised.py data=tcga_nsclc model=abmil
#
#   # Random-init Mamba2MIL
#   python scripts/train_supervised.py data=tcga_nsclc model=mamba2mil
#
#   # SSL-pretrained Mamba2MIL fine-tuning
#   python scripts/train_supervised.py data=tcga_nsclc model=mamba2mil \
#       training.aggregator_weights_path=outputs/pretrain/.../best.ckpt \
#       training.aggregator_lr=1e-5 training.head_lr=1e-4

defaults:
  - platform: local
  - data: gej
  - encoder: uni2h
  - extraction: default
  - splits: kfold5
  - model: mamba2mil
  - training: supervised_mil
  - _self_

exp_name: sup_${data.name}_${model.name}
n_boot: 1000
verbose: false

# ── Optional external test cohort (e.g. TCGA → CPTAC) ───────────────────────
# Set test_data.mmap_dir and test_data.manifest_csv to evaluate on an external
# cohort after each fold. Leave null to skip.
test_data:
  mmap_dir: null
  manifest_csv: null
  label_column: null          # null = same as primary data
  patient_column: null
  filename_column: null
